settings:
  # The cooldown time (in seconds) between hits
  # This is used to prevent players from hitting too frequently
  hit-cooldown: 0.5
  # The maximum distance (in blocks) that a player can be hit from
  max-distance: 6
  # The time (in seconds) that a hit will be stored in the hit cache before it expires
  # This is used to prevent multiple hits from being registered within a short period of time
  expiration: 2
  # The radius (in blocks) where other players can see the destruction and the progress bar
  packet-radius: 20

sounds:
  # The sound that will be played when a block breaks
  block-break:
    # The sound is defined using the Minecraft sound event name (e.g., "minecraft:block.stone.break")
    # You can find a list of all available sounds here: https://minecraft.wiki/w/Category:Block_sounds
    sound: "minecraft:block.stone.break"
    volume: 1.0f # The volume of the sound (0.0 to 1.0)
    pitch: 1.0f # The pitch of the sound (0.5 to 2.0, where 1.0 is normal pitch)

progress-bar:
  # This is the height above the block being hit where the progress bar will be displayed
  # 1.0 means it will be displayed on the top of the block (1.2 or 1.3 is usually good for better visibility)
  offset-y: 1.3
  # The length of the progress bar in characters (refers to 'lang.yml')
  # This is used to determine how many characters will be used to represent the progress bar visually.
  length: 10